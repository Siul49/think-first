# User Preferences (Optional)
# Project-specific user configuration
#
# This file is optional. Works with defaults if not present.
# CLI priority: --vendor arg > agent_cli_mapping > default_cli > cli-config.yaml's active_vendor > antigravity

# Response language setting (ko, en, ja, zh, ...)
language: ko

# Date/time format
date_format: ISO
timezone: Asia/Seoul

# Default CLI (for single tasks)
default_cli: antigravity

# Per-agent CLI mapping (multi-CLI mode)
agent_cli_mapping:
  frontend: antigravity
  backend: antigravity
  mobile: antigravity
  qa: antigravity
  debug: antigravity
  pm: antigravity
